<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #000; color: #d4af37; font-family: sans-serif; }
        #canvas-container { position: relative; width: 600px; height: 600px; }
        .controls { margin-top: 20px; }
        button { padding: 12px 24px; cursor: pointer; background: #d4af37; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="canvas-container"><canvas id="world"></canvas></div>
    <div class="controls">
        <button onclick="startRace()">開始競速</button>
        <button onclick="location.reload()">重設</button>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        const { Engine, Render, Runner, Bodies, Composite, Events, Detector } = Matter;
        const engine = Engine.create();
        const render = Render.create({
            canvas: document.getElementById('world'),
            engine: engine,
            options: { width: 600, height: 600, wireframes: false, background: '#111' }
        });

        // 建立賽道 (簡單的 Z 字形路徑)
        const track = [
            Bodies.rectangle(150, 100, 200, 10, { isStatic: true, angle: 0.3 }),
            Bodies.rectangle(450, 250, 200, 10, { isStatic: true, angle: -0.3 }),
            Bodies.rectangle(150, 400, 200, 10, { isStatic: true, angle: 0.3 }),
            Bodies.rectangle(300, 550, 400, 10, { isStatic: true }) // 終點區
        ];
        Composite.add(engine.world, track);

        // 建立 20 個球
        const balls = [];
        const colors = ['#e63946', '#f1faee', '#a8dadc', '#457b9d', '#1d3557'];
        for(let i=1; i<=20; i++) {
            let b = Bodies.circle(50 + (i*20), -100 - (i*50), 12, {
                restitution: 0.6, render: { fillStyle: colors[i % 5] }
            });
            b.label = i.toString();
            balls.push(b);
        }
        Composite.add(engine.world, balls);

        // 競速結果捕捉
        const winners = [];
        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach(pair => {
                let ball = pair.bodyA.label !== "undefined" ? pair.bodyA : pair.bodyB;
                if (pair.bodyB.position.y > 530 && winners.length < 4 && !winners.includes(ball.label)) {
                    winners.push(ball.label);
                    ball.render.fillStyle = '#ffff00'; // 到達終點變黃色
                    if(winners.length === 4) alert("前 4 名號碼: " + winners.join(", "));
                }
            });
        });

        function startRace() {
            // 讓球體受到重力自然落下
            engine.world.gravity.y = 1;
        }

        Render.run(render);
        Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
