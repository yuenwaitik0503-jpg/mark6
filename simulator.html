<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #000; color: #d4af37; font-family: sans-serif; }
        #canvas-container { position: relative; width: 600px; height: 500px; }
        canvas { display: block; }
        .controls { margin-top: 20px; display: flex; gap: 15px; }
        button { padding: 12px 24px; cursor: pointer; background: #d4af37; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="canvas-container">
        <canvas id="world"></canvas>
    </div>
    <div class="controls">
        <button onclick="mix()">攪珠</button>
        <button onclick="draw()">抽取</button>
        <button onclick="location.reload()">重設</button>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        const { Engine, Render, Runner, Bodies, Composite, Body, Events, Vector } = Matter;
        const canvas = document.getElementById('world');
        const engine = Engine.create();
        const render = Render.create({
            canvas: canvas,
            engine: engine,
            options: { width: 600, height: 500, wireframes: false, background: '#111' }
        });

        const centerX = 300, centerY = 250, cageRadius = 200;

        function drawCage(ctx) {
            ctx.beginPath();
            ctx.arc(centerX, centerY, cageRadius, 0, Math.PI * 2);
            ctx.strokeStyle = '#d4af37';
            ctx.lineWidth = 8;
            ctx.stroke();
        }

        // 物理牆 (加厚與更密)
        const walls = [];
        for (let i = 0; i < 100; i++) {
            const angle = (i / 100) * Math.PI * 2;
            const x = centerX + Math.cos(angle) * (cageRadius + 10);
            const y = centerY + Math.sin(angle) * (cageRadius + 10);
            walls.push(Bodies.rectangle(x, y, 50, 50, { isStatic: true, angle: angle, render: { visible: false } }));
        }
        Composite.add(engine.world, walls);

        const balls = [];
        const colors = ['#e63946', '#f1faee', '#a8dadc', '#457b9d', '#1d3557'];
        for(let i=1; i<=20; i++) {
            const b = Bodies.circle(centerX + (Math.random()-0.5)*50, centerY + (Math.random()-0.5)*50, 15, {
                restitution: 0.5, friction: 0.05, render: { fillStyle: colors[i % 5] }
            });
            b.label = i.toString();
            balls.push(b);
        }
        Composite.add(engine.world, balls);

        // 強制拘束：每幀檢查球體，若超出範圍則硬拉回
        Events.on(engine, 'beforeUpdate', () => {
            balls.forEach(b => {
                const dist = Vector.magnitude(Vector.sub(b.position, {x: centerX, y: centerY}));
                if (dist > cageRadius - 15) {
                    // 將球拉回圓心方向
                    const angle = Math.atan2(b.position.y - centerY, b.position.x - centerX);
                    Body.setPosition(b, {
                        x: centerX + Math.cos(angle) * (cageRadius - 16),
                        y: centerY + Math.sin(angle) * (cageRadius - 16)
                    });
                    // 抵消向外的速度
                    Body.setVelocity(b, { x: 0, y: 0 });
                }
            });
        });

        Events.on(render, 'afterRender', function() {
            const ctx = render.context;
            drawCage(ctx);
            balls.forEach(b => {
                ctx.fillStyle = '#000';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(b.label, b.position.x, b.position.y + 5);
            });
        });

        function mix() {
            balls.forEach(b => {
                Body.applyForce(b, b.position, { 
                    x: (Math.random()-0.5) * 0.5, 
                    y: (Math.random()-0.5) * 0.5 
                });
            });
        }

        function draw() {
            if (balls.length > 0) {
                const b = balls[Math.floor(Math.random() * balls.length)];
                alert("抽中號碼: " + b.label);
                Composite.remove(engine.world, b);
                balls.splice(balls.indexOf(b), 1);
            }
        }

        Render.run(render);
        Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
